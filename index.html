<!DOCTYPE html>
<html>
<head>
    <title>Outlier Hunter - WSN Demo</title>
    <style>
        body { background: #0a0a0c; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #333; box-shadow: 0 0 20px rgba(0,255,204,0.2); cursor: crosshair; }
        .controls { margin-top: 20px; background: #1a1a1f; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        button { background: #00ffcc; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ff0055; color: white; }
        .stats { margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>OUTLIER HUNTER: WSN ROBUST LOC</h1>
    <div class="stats">目标真实坐标: <span id="truePos">--</span> | 估算偏差: <span id="error">--</span></div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div class="controls">
        <button onclick="toggleRobust()">切换算法：<span id="algoName">最小二乘 (LSE)</span></button>
        <button onclick="addMalicious()">投放恶意节点</button>
        <button onclick="resetGame()">重置实验</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let isRobust = false;
let anchors = [];
let target = { x: 400, y: 250 };
let maliciousCount = 0;

// 初始化锚节点
function init() {
    anchors = [];
    for(let i=0; i<6; i++) {
        anchors.push({
            x: Math.random() * 700 + 50,
            y: Math.random() * 400 + 50,
            isMalicious: false,
            offset: 0
        });
    }
}

function addMalicious() {
    let node = anchors[Math.floor(Math.random() * anchors.length)];
    node.isMalicious = true;
    node.offset = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 150 + 100);
    maliciousCount++;
}

// 核心算法简化版
function calculateLocation() {
    let sumX = 0, sumY = 0;
    let validAnchors = anchors;

    if (isRobust) {
        // 模拟 L1-norm 逻辑：剔除残差过大的点
        // 这里用简单的中值滤波思想演示
        let rawEstimates = anchors.map(a => ({x: target.x + (a.isMalicious ? a.offset : 0), y: target.y}));
        // 鲁棒处理... (实际代码中你会换成你的解耦优化公式)
        return { 
            x: target.x + (Math.random()-0.5)*5, // 鲁棒模式下回归真实
            y: target.y + (Math.random()-0.5)*5 
        };
    } else {
        // 普通 LSE 模式：被恶意节点严重干扰
        anchors.forEach(a => {
            let noise = a.isMalicious ? a.offset : 0;
            sumX += target.x + noise;
            sumY += target.y + noise;
        });
        return { x: sumX / anchors.length, y: sumY / anchors.length };
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 画网格
    ctx.strokeStyle = '#111';
    for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,500); ctx.stroke(); }

    // 画锚节点
    anchors.forEach(a => {
        ctx.fillStyle = a.isMalicious ? '#ff0055' : '#00aaff';
        ctx.beginPath();
        ctx.arc(a.x, a.y, 8, 0, Math.PI*2);
        ctx.fill();
        if(a.isMalicious) { // 恶意节点发出的错误信号波
            ctx.strokeStyle = '#ff0055';
            ctx.beginPath();
            ctx.arc(a.x, a.y, 20 + Math.sin(Date.now()/200)*10, 0, Math.PI*2);
            ctx.stroke();
        }
    });

    // 画估算目标
    let est = calculateLocation();
    ctx.fillStyle = '#00ffcc';
    ctx.shadowBlur = 15; ctx.shadowColor = '#00ffcc';
    ctx.fillRect(est.x-10, est.y-10, 20, 20);
    ctx.shadowBlur = 0;

    // 更新数据
    document.getElementById('error').innerText = Math.hypot(est.x - target.x, est.y - target.y).toFixed(2) + "px";
    document.getElementById('truePos').innerText = `[${Math.round(target.x)}, ${Math.round(target.y)}]`;

    requestAnimationFrame(draw);
}

function toggleRobust() {
    isRobust = !isRobust;
    document.getElementById('algoName').innerText = isRobust ? "鲁棒 L1-Norm" : "最小二乘 (LSE)";
}

function resetGame() { location.reload(); }

init();
draw();
</script>
</body>
</html>
